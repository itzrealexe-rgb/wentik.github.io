<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Redirecting...</title></head>
<body style="background:#0a0a0f;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;flex-direction:column;">
    <div style="font-size:48px;">⏳</div>
    <h1>Logging in...</h1>
    <p style="color:#707070;">Please wait...</p>
    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) { window.location.href = '/'; return; }

            try {
                const configRes = await fetch('/informat.json');
                const config = await configRes.json();
                const apiBase = config.api.baseUrl;

                const res = await fetch(`${apiBase}/api/auth/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    document.cookie = `user=${encodeURIComponent(JSON.stringify(data.user))}; path=/; max-age=2592000; SameSite=Lax`;
                    document.cookie = `token=${data.token}; path=/; max-age=2592000; SameSite=Lax`;
                    window.location.href = '/dashboard.html';
                } else {
                    window.location.href = '/';
                }
            } catch (e) {
                console.error(e);
                window.location.href = '/';
            }
        })();
    </script>
</body>
</html>
